name: deploy

# Builds web/ and publishes to the gh-pages branch.
# (The repo's GITHUB_TOKEN cannot create a Pages site via the Pages API,
#  so we use branch-based publishing, which GitHub enables automatically
#  for a gh-pages branch.)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          commit_message: "deploy: ${{ github.sha }}"

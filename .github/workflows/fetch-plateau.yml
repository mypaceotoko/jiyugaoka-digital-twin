name: fetch-plateau

# Downloads PLATEAU CityGML (Tokyo 23-ku) for the Jiyugaoka meshes,
# extracts LOD1 buildings, then rebuilds city.json (PLATEAU buildings +
# OSM roads/rails/names) and commits the result.
# 出典: 国土交通省 Project PLATEAU（編集・加工して使用）

on:
  workflow_dispatch:
  push:
    branches:
      - claude/jiyugaoka-dev-plan-ig4ycu
    paths:
      - "scripts/fetch_plateau.py"
      - ".github/workflows/fetch-plateau.yml"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch PLATEAU buildings (CityGML LOD1)
        run: python3 scripts/fetch_plateau.py

      - name: Fetch OSM data (for roads/rails/names)
        run: python3 scripts/fetch_osm.py

      - name: Install pipeline dependencies
        working-directory: scripts
        run: npm ci

      - name: Rebuild city.json
        run: node scripts/process_osm.mjs

      - name: Commit & push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed web/public/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: rebuild city.json with PLATEAU LOD1 buildings

出典: 国土交通省 Project PLATEAU 東京都23区 3D都市モデル（編集・加工して使用）
roads/rails/names: (c) OpenStreetMap contributors (ODbL)"
            git pull --rebase
            git push
          fi

name: fetch-data

# Fetches OSM data via Overpass API and regenerates city.json.
# Run manually from the Actions tab (workflow_dispatch).
# Derived data is ODbL 1.0 — (c) OpenStreetMap contributors.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/jiyugaoka-dev-plan-ig4ycu
    paths:
      - "scripts/**"
      - ".github/workflows/fetch-data.yml"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch OSM data (Overpass API)
        run: python3 scripts/fetch_osm.py

      - name: Install pipeline dependencies
        working-directory: scripts
        run: npm ci

      - name: Process into city.json
        run: node scripts/process_osm.mjs

      - name: Commit & push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed web/public/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: regenerate city.json from OSM (ODbL, (c) OpenStreetMap contributors)"
            git push
          fi
